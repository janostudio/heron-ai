name: review_team
description: "Review team: editor reviews and polishes the blog post"

stages:
  - process: sequential
    tasks:
      - name: review_blog
        agent: editor
        description: |
          Review and polish the blog post from the previous stage.
          Check for:
          - Grammar and spelling errors
          - Logical flow and structure
          - SEO optimization
          - Factual accuracy
          - Tone and readability
          
          Provide the final polished version with a review summary.
